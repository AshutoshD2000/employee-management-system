{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4 text-center">Employee List</h2>

<a href="/add/" class="btn btn-success mb-3">Add Employee</a>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Salary</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for emp in employees %}

<tr>

<td>{{emp.name}}</td>
<td>{{emp.email}}</td>
<td>{{emp.department}}</td>
<td>{{emp.salary}}</td>

<td>

<a href="/edit/{{emp.id}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{emp.id}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
